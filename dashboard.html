<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Campus Life Planner</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="arsenal-header" role="banner">
    <div class="arsenal-header-inner">
      <h1 class="arsenal-logo">Campus Life Planner</h1>
      <button class="napoli-toggle" id="napoli-toggle"
        aria-controls="liverpool-nav"
        aria-expanded="false"
        aria-label="Toggle navigation menu">
        <span aria-hidden="true">Menu</span>
      </button>
      <nav id="liverpool-nav" class="liverpool-nav" aria-label="Main navigation">
        <ul>
          <li><a href="about.html">About</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="index.html">Planner</a></li>
          <li><a href="settings.html">Settings</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content" class="arsenal-main">

    <section id="dashboard" class="porto-section" aria-labelledby="h2-dashboard">
      <h2 id="h2-dashboard">Dashboard</h2>

      <div class="dortmund-stats" id="dortmund-stats" aria-label="Statistics"></div>

      <!-- Last 7 Days removed per user request -->

      <div class="dortmund-cap">
        <label for="milan-cap">Weekly target (hours):</label>
        <input type="number" id="milan-cap" min="0" max="200" step="0.5"
          aria-describedby="milan-cap-msg" />
        <span id="milan-cap-msg" role="status" aria-live="polite"></span>
      </div>

      <div class="dortmund-extra" style="margin-top:1rem; display:grid; gap:1rem;">
        <div class="dortmund-upcoming" id="dortmund-upcoming">
          <h3>Upcoming Events</h3>
          <ul id="upcoming-list"></ul>
        </div>

        <div class="dortmund-activity" id="dortmund-activity">
          <h3>Recent Activity</h3>
          <ul id="activity-list"></ul>
        </div>

        <div class="dortmund-tags" id="dortmund-tags">
          <h3>Tag Breakdown</h3>
          <div id="tags-list"></div>
        </div>

        <div class="dortmund-actions">
          <h3>Quick Actions</h3>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            <a href="index.html#planner" class="milan-btn milan-primary">Add / View Events</a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="arsenal-footer" role="contentinfo">
    <p>Campus Life Planner &copy; 2026</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
